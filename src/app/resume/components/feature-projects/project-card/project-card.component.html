<div class="project-card">
  <img class="previewImg" [src]="project().imageUrl" alt="Project 1" />
  <div class="content">
    <h3 class="title">{{ project().name }}</h3>
    <p class="description">
      {{ project().description }}
    </p>
    <div class="btnGroup">
      <a class="project-link" (click)="onClick()">
        {{ project().linkText }}
      </a>
    </div>
  </div>
</div>
